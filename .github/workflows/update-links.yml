name: Update SharePoint Links

on:
  push:
    branches: [main]
    paths:
      - "scripts/generate_links.py"  # re-run when the script itself changes
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit links.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate links.json
        env:
          TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
        run: python scripts/generate_links.py

      - name: Commit updated links.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add links.json
          git diff --staged --quiet \
            && echo "links.json unchanged — nothing to commit." \
            || git commit -m "chore: refresh SharePoint links [skip ci]"
          git push

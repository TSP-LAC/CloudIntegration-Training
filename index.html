<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudIntegration Practice — Course</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      /* TSP brand palette */
      --bg: #081427;          /* deep navy */
      --bg-2: #0b1c36;
      --panel: #102a4c;       /* navy panel */
      --panel-2: #143a66;
      --text: #eaf2fb;
      --muted: #9fb4cf;
      --primary: #1566b2;     /* TSP blue */
      --accent: #00d4ff;      /* TSP cyan */
      --border: #1d3f6b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg-2) 0%, var(--bg) 60%) fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      scroll-behavior: smooth;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 96px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 14px 26px;
      border-radius: 16px;
      margin-bottom: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .logo-badge img {
      height: 46px;
      width: auto;
      display: block;
    }

    header .kicker {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    header h1 {
      font-size: 34px;
      margin: 10px 0 6px;
    }

    header p {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
    }

    .modules {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: transform .15s, border-color .15s, background .15s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .card .num {
      flex: 0 0 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0, 212, 255, .18);
    }

    .card .body { flex: 1 1 auto; min-width: 0; }

    .card .title {
      font-size: 17px;
      font-weight: 600;
      margin: 0 0 3px;
    }

    .card .meta {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .card .arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 22px;
      transition: transform .15s, color .15s;
    }

    .card:hover .arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    /* ---------- Viewed state (discreet) ---------- */
    .card .check {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      display: none;
      color: #4caf7d;
      font-size: 15px;
    }

    .card.done { opacity: .62; }
    .card.done:hover { opacity: 1; }
    .card.done .num {
      filter: grayscale(1);
      box-shadow: none;
    }
    .card.done .check { display: block; }
    .card.done .arrow { display: none; }

    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: 13px;
    }

    .signin-wrap {
      text-align: center;
      padding: 40px 20px;
    }
    .signin-wrap p { color: var(--muted); margin-bottom: 20px; }

    .btn-signin {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-signin:hover { background: var(--accent); color: #081427; }
  </style>

  <!-- MSAL Browser v2 — via jsDelivr (reliable CDN, always available) -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/dist/msal-browser.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo-badge"><img src="tsp-logo.png" alt="TSP — The Silicon Partners" /></span>
      <div class="kicker">CloudIntegration Practice</div>
      <h1>PDF Course</h1>
      <p>Click a module to open the material in a new tab.</p>
    </header>

    <div class="modules" id="modules"></div>

    <footer>
      Os PDFs abrem no SharePoint — é necessário estar autenticado com sua conta TSP.
    </footer>
  </div>

  <script>
    // ── MSAL / Graph configuration ───────────────────────────────────────────
    const MSAL_CFG = {
      auth: {
        clientId:    "d2d97c73-1026-4f40-80bb-bf209e06a8b1",
        authority:   "https://login.microsoftonline.com/0595e5dd-a0e5-42ea-b599-809bd9dd6869",
        redirectUri: "https://tsp-lac.github.io/CloudIntegration-Training/",
      },
      cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false },
    };

    // Delegated scope — user signs in with their own TSP account
    const SCOPES = ["https://graph.microsoft.com/Files.Read.All"];

    // SharePoint site where the lesson PDFs live (from the original sharing URLs)
    const SP_SITE_PATH = "thesiliconpartner.sharepoint.com:/sites/hxmpractice:";
    const GRAPH = "https://graph.microsoft.com/v1.0";

    const LESSONS = [
      { lesson: 1, title: "Lesson 1", desc: "Integration Fundamentals and APIs",  filename: "Lesson 1 - Integration Fundamentals and APIs.pdf" },
      { lesson: 2, title: "Lesson 2", desc: "OData and the SAP World",            filename: "Lesson 2 - OData and the SAP World.pdf" },
      { lesson: 3, title: "Lesson 3", desc: "Introduction to SAP BTP",            filename: "Lesson 3 - Introduction to SAP BTP.pdf" },
      { lesson: 4, title: "Lesson 4", desc: "First iFlow with an Open API",       filename: "Lesson 4 - First iFlow with an Open API.pdf" },
      { lesson: 5, title: "Lesson 5", desc: "Connecting to SAP SuccessFactors",   filename: "Lesson 5 - Connecting to SAP SuccessFactors.pdf" },
      { lesson: 6, title: "Lesson 6", desc: "Best Practices and Final Project",   filename: "Lesson 6 - Best Practices and Final Project.pdf" },
    ];

    // ── DOM helpers ───────────────────────────────────────────────────────────
    const STORAGE_KEY = "cloudintegration-course-done";
    const loadDone = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } };
    const saveDone = (d) => localStorage.setItem(STORAGE_KEY, JSON.stringify(d));

    const container = document.getElementById("modules");
    const setMsg = (html) => { container.innerHTML = html; };

    function buildCard(m, index, done) {
      const a = document.createElement("a");
      const hasUrl = !!m.url;
      a.className = "card" + (done[m.url] ? " done" : "");
      a.href = hasUrl ? m.url : "#";
      if (hasUrl) {
        a.target = "_blank";
        a.rel = "noopener";
        a.addEventListener("click", () => { done[m.url] = true; saveDone(done); a.classList.add("done"); });
      } else {
        a.style.opacity = "0.45";
        a.style.cursor  = "not-allowed";
        a.addEventListener("click", (e) => e.preventDefault());
      }
      a.innerHTML = `
        <div class="num">${index + 1}</div>
        <div class="body"><p class="title">${m.title}</p><p class="meta">${m.desc}</p></div>
        <div class="check">✓</div>
        <div class="arrow">→</div>`;
      return a;
    }

    function renderModules(modules) {
      const done = loadDone();
      container.innerHTML = "";
      modules.forEach((m, i) => container.appendChild(buildCard(m, i, done)));
    }

    function showSignIn(msalApp) {
      setMsg(`
        <div class="signin-wrap">
          <p>Faça login com sua conta TSP para acessar os materiais.</p>
          <button class="btn-signin" id="btn-signin">
            <svg width="18" height="18" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
              <rect x="1"  y="1"  width="9" height="9" fill="#F25022"/>
              <rect x="11" y="1"  width="9" height="9" fill="#7FBA00"/>
              <rect x="1"  y="11" width="9" height="9" fill="#00A4EF"/>
              <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
            </svg>
            Entrar com Microsoft
          </button>
        </div>`);
      document.getElementById("btn-signin").addEventListener("click", () =>
        msalApp.loginRedirect({ scopes: SCOPES }));
    }

    // ── Graph API: list all files in the site drive matching 'Lesson' ─────────
    async function fetchLessonLinks(token) {
      // Search within the hxmpractice site drive — returns all items whose name
      // contains 'Lesson', then we match by exact filename.
      const url =
        `${GRAPH}/sites/${SP_SITE_PATH}/drive/root/search(q='Lesson')` +
        `?$select=name,webUrl&$top=50`;

      const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!resp.ok) {
        const body = await resp.text();
        throw new Error(`Graph ${resp.status}: ${body.slice(0, 300)}`);
      }
      const data = await resp.json();

      // Build filename → webUrl map
      const fileMap = {};
      for (const item of (data.value || [])) fileMap[item.name] = item.webUrl;

      return LESSONS.map(l => ({ ...l, url: fileMap[l.filename] || "" }));
    }

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    async function init() {
      const msalApp = new msal.PublicClientApplication(MSAL_CFG);

      setMsg('<p style="color:var(--muted);text-align:center;padding:32px 0">Carregando…</p>');

      // Capture token from redirect (if we're returning from loginRedirect)
      let token = null;
      try {
        const redirectResp = await msalApp.handleRedirectPromise();
        if (redirectResp) token = redirectResp.accessToken;
      } catch (e) { console.warn("handleRedirectPromise:", e); }

      // Try silent acquisition if not from redirect
      if (!token) {
        const accounts = msalApp.getAllAccounts();
        if (accounts.length > 0) {
          try {
            const silent = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
            token = silent.accessToken;
          } catch (e) { console.warn("Silent token failed:", e); }
        }
      }

      if (!token) { showSignIn(msalApp); return; }

      try {
        const modules = await fetchLessonLinks(token);
        renderModules(modules);
      } catch (err) {
        console.error(err);
        setMsg(`<p style="color:#e74c3c;text-align:center;padding:32px 0">Erro ao buscar arquivos do SharePoint.<br><small style="color:var(--muted)">${err.message}</small></p>`);
      }
    }

    init().catch(console.error);
  </script>
</body>
</html>

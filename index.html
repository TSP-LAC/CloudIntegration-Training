<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudIntegration Practice — Course</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      /* TSP brand palette */
      --bg: #081427;          /* deep navy */
      --bg-2: #0b1c36;
      --panel: #102a4c;       /* navy panel */
      --panel-2: #143a66;
      --text: #eaf2fb;
      --muted: #9fb4cf;
      --primary: #1566b2;     /* TSP blue */
      --accent: #00d4ff;      /* TSP cyan */
      --border: #1d3f6b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg-2) 0%, var(--bg) 60%) fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      scroll-behavior: smooth;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 96px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 14px 26px;
      border-radius: 16px;
      margin-bottom: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .logo-badge img {
      height: 46px;
      width: auto;
      display: block;
    }

    header .kicker {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    header h1 {
      font-size: 34px;
      margin: 10px 0 6px;
    }

    header p {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
    }

    .modules {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: transform .15s, border-color .15s, background .15s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .card .num {
      flex: 0 0 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0, 212, 255, .18);
    }

    .card .body { flex: 1 1 auto; min-width: 0; }

    .card .title {
      font-size: 17px;
      font-weight: 600;
      margin: 0 0 3px;
    }

    .card .meta {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .card .arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 22px;
      transition: transform .15s, color .15s;
    }

    .card:hover .arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    /* ---------- Viewed state (discreet) ---------- */
    .card .check {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      display: none;
      color: #4caf7d;
      font-size: 15px;
    }

    .card.done { opacity: .62; }
    .card.done:hover { opacity: 1; }
    .card.done .num {
      filter: grayscale(1);
      box-shadow: none;
    }
    .card.done .check { display: block; }
    .card.done .arrow { display: none; }

    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo-badge"><img src="tsp-logo.png" alt="TSP — The Silicon Partners" /></span>
      <div class="kicker">CloudIntegration Practice</div>
      <h1>PDF Course</h1>
      <p>Click a module to open the material in a new tab.</p>
    </header>

    <div class="modules" id="modules"></div>

    <footer>
      The PDFs open in SharePoint — you must be signed in to your TSP account.
    </footer>
  </div>

  <script>
    const STORAGE_KEY = "cloudintegration-course-done";
    const loadDone = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    };
    const saveDone = (d) => localStorage.setItem(STORAGE_KEY, JSON.stringify(d));

    const container = document.getElementById("modules");

    function buildCard(m, index, done) {
      const a = document.createElement("a");
      const hasUrl = !!m.url;
      a.className = "card" + (done[m.url] ? " done" : "");
      a.href = hasUrl ? m.url : "#";
      if (hasUrl) {
        a.target = "_blank";
        a.rel = "noopener";
        a.addEventListener("click", () => {
          done[m.url] = true;
          saveDone(done);
          a.classList.add("done");
        });
      } else {
        a.style.opacity = "0.45";
        a.style.cursor = "not-allowed";
        a.addEventListener("click", (e) => e.preventDefault());
      }
      a.innerHTML = `
        <div class="num">${index + 1}</div>
        <div class="body">
          <p class="title">${m.title}</p>
          <p class="meta">${m.desc}</p>
        </div>
        <div class="check">✓</div>
        <div class="arrow">→</div>
      `;
      return a;
    }

    // Cache-bust once per day so browsers pick up fresh links.json after a workflow run
    const cacheBuster = new Date().toISOString().slice(0, 10);
    container.innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:32px 0">Loading…</p>';

    fetch("links.json?v=" + cacheBuster)
      .then((r) => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then((modules) => {
        const done = loadDone();
        container.innerHTML = "";
        modules.forEach((m, i) => container.appendChild(buildCard(m, i, done)));
      })
      .catch((err) => {
        console.error("Failed to load links.json:", err);
        container.innerHTML =
          '<p style="color:#e74c3c;text-align:center;padding:32px 0">Falha ao carregar os módulos. Tente novamente.</p>';
      });
  </script>
</body>
</html>
